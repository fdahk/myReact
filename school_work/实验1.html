<!DOCTYPE html>
<html lang="zh-CN">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>实验一</title>
        <style>
          body {
            margin: 0;
            font-family: "Microsoft YaHei", "PingFang SC", sans-serif;
            background: #ffffff;
          }
    
          .card {
            width: 360px;
            margin: 40px auto;
            padding: 20px 22px 16px;
            border: 1px solid #e2e2e2;
            border-bottom: 3px solid #c62828;
          }
    
          h2 {
            margin: 0 0 16px;
            font-size: 38px;
            letter-spacing: 0.5em;
          }
    
          .author {
            margin: 0 0 14px;
            font-size: 34px;
            font-weight: 700;
            color: #d50000;
            line-height: 1.2;
          }
    
          .author span {
            color: #000000;
            font-weight: 400;
          }
    
          p {
            margin: 0;
            font-size: 32px;
            line-height: 1.55;
          }
        </style>
      </head>
      <body>
        <article class="card">
          <h2>题西林壁</h2>
          <h3 class="author">宋<i style="color: #000000; font-size: 25px;">.苏轼</i></h3>
          <p>
            横看成岭侧成峰，<br />
            远近高低各不同。<br /><br />
            不识庐山真面目，<br />
            <ins>只缘身在此山中。</ins>
          </p>
        </article>
      </body>
</html>
